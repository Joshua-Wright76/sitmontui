name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Intel target
        run: rustup target add x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Prepare binaries
        run: |
          cp target/aarch64-apple-darwin/release/sitmon_cli ./sitmon_cli
          cp target/x86_64-apple-darwin/release/sitmon_cli ./sitmon_cli-x86_64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            sitmon_cli
            sitmon_cli-x86_64-apple-darwin

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: .

      - name: Calculate shasums
        id: shasum
        run: |
          ARM64_SHA=$(shasum -a 256 sitmon_cli | awk '{print $1}')
          X86_SHA=$(shasum -a 256 sitmon_cli-x86_64-apple-darwin | awk '{print $1}')
          echo "arm64_sha=$ARM64_SHA" >> $GITHUB_OUTPUT
          echo "x86_sha=$X86_SHA" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sitmon_cli
            sitmon_cli-x86_64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_VERSION: ${{ github.ref_name }}
          ARM64_SHA: ${{ steps.shasum.outputs.arm64_sha }}
          X86_SHA: ${{ steps.shasum.outputs.x86_sha }}
        run: |
          FORMULA_CONTENT="class Sitmon < Formula
            desc \"Rust TUI situation monitor\"
            homepage \"https://github.com/Joshua-Wright76/sitmontui\"
            license \"MIT\"
            head \"https://github.com/Joshua-Wright76/sitmontui.git\"

            on_macos do
              on_arm do
                url \"https://github.com/Joshua-Wright76/sitmontui/releases/download/v${TAG_VERSION}/sitmon_cli\"
                sha256 \"${ARM64_SHA}\"
              end
              on_intel do
                url \"https://github.com/Joshua-Wright76/sitmontui/releases/download/v${TAG_VERSION}/sitmon_cli-x86_64-apple-darwin\"
                sha256 \"${X86_SHA}\"
              end
            end

            def install
              bin.install \"sitmon_cli\" => \"sitmon\"
            end

            test do
              system \"#{bin}/sitmon\", \"--help\"
            end
          end"

          FORMULA_B64=$(echo "$FORMULA_CONTENT" | base64 -w0)
          CURRENT_SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/Joshua-Wright76/sitmontui-brew/contents/Formula/sitmon.rb | jq -r .sha)

          curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/Joshua-Wright76/sitmontui-brew/contents/Formula%2Fsitmon.rb \
            -d "{\"message\":\"Update sitmon to ${TAG_VERSION}\",\"content\":\"${FORMULA_B64}\",\"sha\":\"${CURRENT_SHA}\"}"